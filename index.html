<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAM Radio Toolbox - 业余无线电工具箱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI","Microsoft YaHei",sans-serif;background:#f0f0f0;color:#333;font-size:14px}
#app{max-width:1000px;margin:0 auto;padding:10px}
h1{font-size:20px;padding:8px 0;text-align:center;color:#1a5276}
.tabs{display:flex;flex-wrap:wrap;background:#2c3e50;border-radius:6px 6px 0 0;overflow:hidden}
.tab-btn{padding:8px 14px;background:#2c3e50;color:#bdc3c7;border:none;cursor:pointer;font-size:13px;transition:.15s}
.tab-btn:hover{background:#34495e;color:#fff}
.tab-btn.active{background:#fff;color:#2c3e50;font-weight:bold}
.tab-content{display:none;background:#fff;border:1px solid #ddd;border-top:none;padding:16px;border-radius:0 0 6px 6px;min-height:400px}
.tab-content.active{display:block}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
label{font-weight:500;white-space:nowrap}
input,select{font-family:inherit;font-size:13px;padding:4px 8px;border:1px solid #ccc;border-radius:3px;outline:none}
input:focus,select:focus{border-color:#3498db}
input[type=number]{width:120px}
button{padding:5px 14px;border:1px solid #2980b9;background:#3498db;color:#fff;border-radius:3px;cursor:pointer;font-size:13px}
button:hover{background:#2980b9}
button.secondary{background:#95a5a6;border-color:#7f8c8d}
button.secondary:hover{background:#7f8c8d}
button.danger{background:#e74c3c;border-color:#c0392b}
button.danger:hover{background:#c0392b}
.result{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:10px;font-family:"Consolas","Courier New",monospace;font-size:13px;white-space:pre-wrap;min-height:80px;max-height:300px;overflow:auto;margin:8px 0}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:4px 8px;border:1px solid #ddd;text-align:center}
th{background:#ecf0f1;font-weight:600;position:sticky;top:0}
tbody tr:nth-child(even){background:#fafafa}
tbody tr:hover{background:#eef4fb}
.scroll-table{max-height:280px;overflow:auto;border:1px solid #ddd;border-radius:4px}
.grid{display:grid;gap:8px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
h2{font-size:16px;color:#2c3e50;margin:10px 0 6px;padding-bottom:4px;border-bottom:2px solid #3498db}
h3{font-size:14px;color:#34495e;margin:8px 0 4px}
.status{background:#ecf0f1;padding:4px 10px;font-size:13px;color:#555;border-radius:0 0 4px 4px;margin-top:6px}
.hint{color:#888;font-size:12px;margin-left:4px}
.warn{color:#e74c3c;font-weight:bold}
@media(max-width:700px){.tabs{flex-direction:column}.tab-btn{text-align:left}}
</style>
</head>
<body>
<div id="app">
<h1>HAM Radio Toolbox - 业余无线电工具箱</h1>
<div class="tabs" id="tabBar"></div>
<div id="tabContainer"></div>
<div class="status" id="status">就绪</div>
</div>
<script>
// ====== Data ======
const C = 299792458;
const CAT_CN = {VLF:"甚低频",LF:"低频",MF:"中频",HF:"高频",VHF:"甚高频",UHF:"特高频",SHF:"超高频",EHF:"极高频"};
const BANDS = [
  {name:"2200m",f_low:0.1357,f_high:0.1378,cat:"LF",license:"C(≤1000W)",svc:"次要业务"},
  {name:"630m",f_low:0.472,f_high:0.479,cat:"MF",license:"C(≤1000W)",svc:"次要业务"},
  {name:"160m",f_low:1.8,f_high:2.0,cat:"MF",license:"C(≤1000W)",svc:"主要业务"},
  {name:"80m",f_low:3.5,f_high:3.9,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"共同主要业务"},
  {name:"60m",f_low:5.3515,f_high:5.3665,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"次要业务"},
  {name:"40m",f_low:7.0,f_high:7.2,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"30m",f_low:10.1,f_high:10.15,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"次要业务"},
  {name:"20m",f_low:14.0,f_high:14.35,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"17m",f_low:18.068,f_high:18.168,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"15m",f_low:21.0,f_high:21.45,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"12m",f_low:24.89,f_high:24.99,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"10m",f_low:28.0,f_high:29.7,cat:"HF",license:"B(<15W) / C(≤1000W)",svc:"主要业务"},
  {name:"6m",f_low:50.0,f_high:54.0,cat:"VHF",license:"A/B/C(≤25W)",svc:"共同主要业务"},
  {name:"2m",f_low:144.0,f_high:148.0,cat:"VHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"1.25m",f_low:222.0,f_high:225.0,cat:"VHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"70cm",f_low:430.0,f_high:440.0,cat:"UHF",license:"A/B/C(≤25W)",svc:"共同主要业务"},
  {name:"33cm",f_low:902.0,f_high:928.0,cat:"UHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"23cm",f_low:1240.0,f_high:1300.0,cat:"UHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"13cm",f_low:2300.0,f_high:2450.0,cat:"UHF",license:"A/B/C(≤25W)",svc:"共同主要业务"},
  {name:"9cm",f_low:3300.0,f_high:3500.0,cat:"SHF",license:"A/B/C(≤25W)",svc:"共同主要业务"},
  {name:"6cm",f_low:5650.0,f_high:5850.0,cat:"SHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"3cm",f_low:10000.0,f_high:10500.0,cat:"SHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"1.2cm",f_low:24000.0,f_high:24250.0,cat:"SHF",license:"A/B/C(≤25W)",svc:"主要业务"},
  {name:"6mm",f_low:47000.0,f_high:47200.0,cat:"EHF",license:"A/B/C(≤25W)",svc:"主要业务"},
];
const SPECTRUM = [[0.003,0.03,"VLF"],[0.03,0.3,"LF"],[0.3,3,"MF"],[3,30,"HF"],[30,300,"VHF"],[300,3000,"UHF"],[3000,30000,"SHF"],[30000,300000,"EHF"]];
const COAX = {RG174:{100:6.6,200:9.5,400:14,1000:23,2400:40},RG58:{100:4.6,200:6.8,400:11,1000:20,2400:34},RG213:{100:1.8,200:2.7,400:4.2,1000:7.5,2400:13.5},RG8X:{100:2.9,200:4.2,400:6.5,1000:12,2400:22},LMR240:{100:2.1,200:3,400:4.6,1000:8,2400:14.2},LMR400:{100:1.2,200:1.7,400:2.7,1000:4.9,2400:8.9},LMR600:{100:0.8,200:1.1,400:1.8,1000:3.3,2400:6}};
const QCODES = {
  QRA:["你台的名称是什么？","我台的名称是......"],QRB:["你台离我台多远？","我们相距约为..."],
  QRG:["我的准确频率是多少？","你的准确频率是..."],QRH:["我的频率稳定吗？","你的频率不稳定。"],
  QRI:["我的音调如何？","你的音调是(T1-T9)"],QRJ:["我的信号小吗？","你的信号小。"],
  QRK:["我的信号可辩度是多少？","你的信号可辩度是(R1-R5)"],QRL:["你忙吗？","我很忙，请不要打扰。"],
  QRM:["你受到他台干扰吗？","他台干扰(1.无 2.稍有 3.中等 4.严重 5.极端)"],QRN:["你受到天电干扰吗？","天电干扰(1.无 2.稍有 3.中等 4.严重 5.极端)"],
  QRO:["要我增加发信功率吗？","请增加发信功率。"],QRP:["要降低发信机功率吗？","请减低发信机功率。"],
  QRQ:["要我发得快些吗？","请发快些。"],QRS:["要我发得慢一些吗？","请发得慢一些(每分钟X字)。"],
  QRT:["要我停止拍发吗？","请停止拍发。"],QRU:["你有什么发给我吗？","我没有什么发给你。"],
  QRV:["你准备好了吗？","我准备好了。"],QRW:["需要我转告吗？","请转告。"],
  QRX:["你什么时候再呼叫我？","我将在X点钟(用..频率)再呼叫您。"],QRZ:["谁在呼叫我？","XX正在(用..频率)呼叫你。"],
  QSA:["我的信号强度怎样？","信号强度:1.几乎收不到 2.弱 3.还好 4.好 5.很好"],QSB:["我的信号有衰落吗？","你的信号有衰落。"],
  QSD:["我的信号不完整吗？","你的信号不完整。"],QSL:["你能确认联络吗？","我现在确认联络。"],
  QSO:["你能与XX直接或接转通信吗？","我能和XX直接或经接转通信。"],QSP:["你能中转到...吗？","我能中转到...。"],
  QSU:["能在(这个)频率回复吗？","我将在此频率(或某频率)回复。"],QSV:["要我在此频率发一串V字吗？","请在此频率发一串V字。"],
  QSW:["你将在此频率发吗？","我将在此频率(或某频率)发。"],QSX:["你将在某频率收听吗？","我将某频率收听。"],
  QSY:["要我改用别的频率拍发吗？","请改用别的频率(用..频率)拍发。"],QSZ:["要我每组发两遍吗？","请每组发两遍。"],
  QTB:["要我查对组数吗？","请查对组数。"],QTC:["你有几份报要发？","我有...份报要发。"],
  QTH:["你的地理位置在...？","我的地理位置在..."],QTR:["你的标准时间是？","我的标准时间是..."],
};
const MODES_LIST = ["SSB","CW","FM","AM","DMR","C4FM","D-STAR","FT8","FT4","RTTY","PSK31","JT65","JT9","WSPR","SSTV","ATV","其他"];

// ====== Core Functions ======
function freqToBand(mhz){for(let b of BANDS){if(b.f_low<=mhz&&mhz<=b.f_high)return b}return null}
function freqToSpec(mhz){for(let[l,h,c]of SPECTRUM){if(l<=mhz&&mhz<h)return c+CAT_CN[c]}return"未知"}
function wavelength(mhz){return C/(mhz*1e6)}
function dipoleLen(mhz){let l=wavelength(mhz);return{total:l/2,perLeg:l/4}}
function qWaveLen(mhz){return wavelength(mhz)/4}
function gridToLatLon(g){g=g.toUpperCase().replace(/\\s/g,'');if(!/^[A-R]{2}[0-9]{2}([A-X]{2})?$/.test(g))throw"无效网格格式";
  let lon=(g.charCodeAt(0)-65)*20-180,lat=(g.charCodeAt(1)-65)*10-90;
  lon+=parseInt(g[2])*2;lat+=parseInt(g[3])*1;
  if(g.length>=6){lon+=(g.charCodeAt(4)-65)*5/60;lat+=(g.charCodeAt(5)-65)*2.5/60}
  if(g.length==4){lon+=1;lat+=0.5}else if(g.length==6){lon+=5/120;lat+=2.5/120}
  return[lat,lon]}
function latLonToGrid(lat,lon,prec){lon+=180;lat+=90;
  let r=String.fromCharCode(Math.floor(lon/20)+65)+String.fromCharCode(Math.floor(lat/10)+65);
  lon%=20;lat%=10;r+=Math.floor(lon/2)+''+Math.floor(lat/1);lon%=2;lat%=1;
  if(prec==6)r+=String.fromCharCode(Math.floor(lon*60/5)+65)+String.fromCharCode(Math.floor(lat*60/2.5)+65);
  return r}
function deg2rad(d){return d*Math.PI/180}
function distanceBearing(l1,n1,l2,n2){let f1=deg2rad(l1),f2=deg2rad(l2),dl=deg2rad(n2-n1);
  let a=Math.sin(dl)*Math.cos(f2),b=Math.cos(f1)*Math.sin(f2)-Math.sin(f1)*Math.cos(f2)*Math.cos(dl);
  let brg=(Math.atan2(a,b)*180/Math.PI+360)%360,df=deg2rad(l2-l1);
  let hv=Math.sin(df/2)**2+Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2,c=2*Math.atan2(Math.sqrt(hv),Math.sqrt(1-hv));
  let km=6371*c;return{km:Math.round(km*10)/10,mi:Math.round(km*0.621371*10)/10,nmi:Math.round(km*0.539957*10)/10,brg:Math.round(brg*10)/10}}
function w2dbm(w){return 10*Math.log10(w)+30}
function dbm2w(d){return Math.pow(10,(d-30)/10)}
function w2dbw(w){return 10*Math.log10(w)}
function dbw2w(d){return Math.pow(10,d/10)}
function swrCalc(fw,rw){if(fw<=0)throw"正向功率需 >0";let r=Math.sqrt(rw/fw);if(r>=1)return Infinity;return(1+r)/(1-r)}
function swrRL(swr){if(swr<=1)return Infinity;return-20*Math.log10((swr-1)/(swr+1))}
function swrRef(swr,fw){let r=(swr-1)/(swr+1);return fw*r*r}
function coaxLoss(cable,freq,len){let d=COAX[cable];if(!d)throw"未知馈线";let fs=Object.keys(d).map(Number).sort((a,b)=>a-b);
  let att;if(freq<=fs[0])att=d[fs[0]];else if(freq>=fs[fs.length-1])att=d[fs[fs.length-1]];
  else{for(let i=0;i<fs.length-1;i++){if(freq>=fs[i]&&freq<=fs[i+1]){let r=(freq-fs[i])/(fs[i+1]-fs[i]);att=d[fs[i]]+r*(d[fs[i+1]]-d[fs[i]]);break}}}
  let t=att*len/100;return{att:Math.round(t*100)/100,p100:Math.round(att*100)/100,loss:Math.round(100*(1-Math.pow(10,-t/10))*10)/10}}

// ====== Tabs ======
const tabs=[{id:"freq",title:"频率/频段"},{id:"modes",title:"通信模式"},{id:"antenna",title:"天线计算"},{id:"grid",title:"区域"},{id:"power",title:"功率转换"},{id:"swr",title:"SWR计算"},{id:"coax",title:"馈线损耗"},{id:"qcode",title:"Q简语"},{id:"log",title:"通联日志"},{id:"utils",title:"工具"}];
const tabBar=document.getElementById("tabBar");
const tabC=document.getElementById("tabContainer");
let activeTab="freq";
function switchTab(id){activeTab=id;document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.toggle("active",c.id===id+"Tab"));}
tabs.forEach(t=>{let b=document.createElement("button");b.className="tab-btn";b.dataset.tab=t.id;b.textContent=t.title;
  b.onclick=()=>switchTab(t.id);tabBar.appendChild(b);let d=document.createElement("div");d.className="tab-content";d.id=t.id+"Tab";tabC.appendChild(d);});
function status(msg){document.getElementById("status").textContent=msg}
function escHtml(s){let d=document.createElement("div");d.textContent=s;return d.innerHTML}

// ====== Build Tab Contents ======
(function(){
// --- Freq Tab ---
let f=byId("freqTab");
f.innerHTML=`
<div class="row">
  <select id="freqMode"><option>频率</option><option>区间</option></select>
  <input type="number" id="freq1" step="any" placeholder="频率">
  <span id="freqSep" style="display:none">~</span>
  <input type="number" id="freq2" step="any" placeholder="上限" style="display:none">
  <select id="freqUnit"><option>MHz</option><option>kHz</option><option>GHz</option></select>
  <button id="freqBtn">查询</button>
  <button class="secondary" id="freqClr">清空</button>
</div>
<div class="result" id="freqResult">请输入频率后点击查询</div>
<h2>频段分配表 <span class="hint">双击行自动搜索区间</span></h2>
<div class="scroll-table" id="freqTableWrap"></div>
<div style="color:#555;font-size:13px;margin-top:6px">A类: 30-3000MHz ≤25W | B类: 30MHz以下 &lt;15W (2024.3.1前取得证书 ≤100W), 30MHz以上 ≤25W | C类: 30MHz以下 ≤1000W, 30MHz以上 ≤25W</div>`;
let fm=byId("freqMode"),f1=byId("freq1"),f2=byId("freq2"),fs=byId("freqSep"),fu=byId("freqUnit"),fb=byId("freqBtn"),fc=byId("freqClr"),fr=byId("freqResult");
fm.onchange=()=>{let v=fm.value==="区间";fs.style.display=v?"inline":"none";f2.style.display=v?"inline":"none";if(!v)f2.style.display="none"};
let unitM={MHz:1,kHz:0.001,GHz:1000},unitL={MHz:"MHz",kHz:"kHz",GHz:"GHz"};
function freqSearch(){let low=parseFloat(f1.value),high=fm.value==="区间"?parseFloat(f2.value):low;
  if(isNaN(low)||isNaN(high)){fr.textContent="请输入有效数值";return}
  let u=fu.value,m=unitM[u];low*=m;high*=m;if(low>high)[low,high]=[high,low];
  if(fm.value==="区间"){fr.textContent=`区间: ${f1.value} ${u} ~ ${f2.value} ${u}\n      (${low.toFixed(6)} MHz ~ ${high.toFixed(6)} MHz)\n\n`;
    let any=false;for(let b of BANDS){if(b.f_low<=high&&b.f_high>=low){any=true;
      fr.textContent+=`=== ${b.name} (${b.cat}${CAT_CN[b.cat]}) ===\n频率范围: ${b.f_low} ~ ${b.f_high} MHz\n业余业务类型: ${b.svc}\n可用执照: ${b.license}\n`;
      let wl1=wavelength(b.f_high),wl2=wavelength(b.f_low);
      if(wl1>=1)fr.textContent+=`波长范围: ${wl2.toFixed(2)} ~ ${wl1.toFixed(2)} m\n`;else fr.textContent+=`波长范围: ${(wl2*100).toFixed(1)} ~ ${(wl1*100).toFixed(1)} cm\n`;
      fr.textContent+=`等效: ${b.f_low} ~ ${b.f_high} MHz = ${(b.f_low*1e3).toFixed(3)} ~ ${(b.f_high*1e3).toFixed(3)} kHz = ${(b.f_low/1e3).toFixed(6)} ~ ${(b.f_high/1e3).toFixed(6)} GHz\n\n`;}
    }if(!any)fr.textContent+="该区间未覆盖任何业余频段\n";status(`区间搜索完成: ${low} ~ ${high} MHz`);
  }else{let b=freqToBand(low),cat=freqToSpec(low),wl=wavelength(low);
    let t="";if(!b)t+="⚠ 非业余业务频率\n";t+=`频率: ${f1.value} ${u}\n`;
    if(b){t+=`频段: ${b.name} (${b.cat}${CAT_CN[b.cat]})\n业余业务类型: ${b.svc}\n可用执照: ${b.license}\n`}
    else t+=`频段: ${cat}\n`;
    t+=wl>=1?`波长: ${wl.toFixed(2)} m\n`:`波长: ${(wl*100).toFixed(1)} cm\n`;
    t+=`\n等效频率: ${low.toFixed(6)} MHz = ${(low*1e3).toFixed(3)} kHz = ${(low/1e3).toFixed(6)} GHz`;
    fr.textContent=t;status(`查询完成: ${low} MHz -> ${b?b.name:cat}`);}}
fb.onclick=freqSearch;f1.onkeydown=e=>{if(e.key==="Enter")freqSearch()};f2.onkeydown=e=>{if(e.key==="Enter")freqSearch()};
fc.onclick=()=>{f1.value="";f2.value="";fr.textContent="请输入频率后点击查询";status("已清空")};
// Band table
let tw=byId("freqTableWrap"),tbl=document.createElement("table"),thead=tbl.createTHead(),tr=thead.insertRow();
["波段","频段类型","下限 (MHz)","上限 (MHz)","业余业务类型"].forEach(h=>{let c=document.createElement("th");c.textContent=h;tr.appendChild(c)});
let tbdy=tbl.createTBody();BANDS.forEach(b=>{let r=tbdy.insertRow();
  r.insertCell().textContent=b.name;r.insertCell().textContent=b.cat+CAT_CN[b.cat];
  r.insertCell().textContent=b.f_low;r.insertCell().textContent=b.f_high;r.insertCell().textContent=b.svc;
  r.style.cursor="pointer";r.ondblclick=()=>{f1.value=b.f_low;f2.value=b.f_high;fm.value="区间";fs.style.display="inline";f2.style.display="inline";freqSearch()};});
tw.appendChild(tbl);

// --- Modes Tab ---
let m=byId("modesTab");let md=[

let l=byId("logTab");
l.innerHTML=`
<h2>新通联记录 <span style="font-weight:normal;font-size:12px;color:#e74c3c">⚠ 数据仅保存在浏览器本地，清除缓存会丢失，退出前请导出</span></h2>

<div class="row"><label>模式:</label><select id="logMode">${MODES_LIST.map(m=>`<option>${m}</option>`).join("")}</select>
<label>RST发:</label><input type="text" id="logRstS" style="width:60px"><label>RST收:</label><input type="text" id="logRstR" style="width:60px">
<label>姓名:</label><input type="text" id="logName" style="width:80px"><label>QTH:</label><input type="text" id="logQth" style="width:120px"><label>备注:</label><input type="text" id="logNote" style="width:120px"></div>
<div class="row"><button id="logSave">保存记录</button><button class="secondary" id="logClear">清空输入</button><span id="logCount" style="margin-left:16px;color:#888"></span></div>
<h2>通联记录 <button class="danger" id="logDel" style="font-size:12px;padding:2px 8px">删除选中</button><button class="secondary" id="logExport" style="font-size:12px;padding:2px 8px">导出 ADIF</button><button class="secondary" id="logDelAll" style="font-size:12px;padding:2px 8px">清空全部</button></h2>
<div class="scroll-table" id="logTableWrap"></div>`;
let qsos=JSON.parse(localStorage.getItem("ham_qsos")||"[]");
function logFill(){let n=new Date();byId("logDate").value=n.toISOString().slice(0,10);byId("logTime").value=n.toISOString().slice(11,16)}logFill();
byId("logTimeBtn").onclick=logFill;
function logRefresh(){let tw=byId("logTableWrap");tw.innerHTML="";let tbl=document.createElement("table"),th=tbl.createTHead(),tr=th.insertRow();
  ["#","日期","时间","呼号","频率","模式","RST发","RST收","姓名","QTH","备注"].forEach(h=>{let c=document.createElement("th");c.textContent=h;tr.appendChild(c)});
  let tb=tbl.createTBody();qsos.forEach((q,i)=>{let r=tb.insertRow();r.dataset.idx=i;
    ["date","time","call","freq","mode","rst_s","rst_r","name","qth","note"].forEach(k=>r.insertCell().textContent=q[k]||"");
    r.onclick=function(){this.classList.toggle("selected");}});
  tw.appendChild(tbl);byId("logCount").textContent=`共 ${qsos.length} 条记录`}
byId("logSave").onclick=()=>{let c=byId("logCall").value.trim().toUpperCase();if(!c){alert("呼号不能为空");return}
  qsos.push({date:byId("logDate").value,time:byId("logTime").value,call:c,freq:byId("logFreq").value.trim(),mode:byId("logMode").value,
    rst_s:byId("logRstS").value.trim(),rst_r:byId("logRstR").value.trim(),name:byId("logName").value.trim(),qth:byId("logQth").value.trim(),note:byId("logNote").value.trim()});
  localStorage.setItem("ham_qsos",JSON.stringify(qsos));logRefresh();logFill();byId("logCall").value="";byId("logFreq").value="";byId("logRstS").value="";byId("logRstR").value="";byId("logName").value="";byId("logQth").value="";byId("logNote").value="";status(`已保存通联记录: ${c}`)};
byId("logClear").onclick=()=>{byId("logCall").value="";byId("logFreq").value="";byId("logRstS").value="";byId("logRstR").value="";byId("logName").value="";byId("logQth").value="";byId("logNote").value="";logFill()};
byId("logDel").onclick=()=>{let sel=document.querySelectorAll("#logTableWrap .selected");if(!sel.length)return;
  let idxs=[...sel].map(r=>parseInt(r.dataset.idx)).sort((a,b)=>b-a);idxs.forEach(i=>qsos.splice(i,1));
  localStorage.setItem("ham_qsos",JSON.stringify(qsos));logRefresh()};
byId("logDelAll").onclick=()=>{if(!qsos.length||!confirm("确定要清空所有通联记录吗？"))return;qsos=[];localStorage.setItem("ham_qsos","[]");logRefresh();status("已清空所有通联记录")};
byId("logExport").onclick=()=>{if(!qsos.length){alert("没有记录可导出");return}
  let lines=["Generated by HAM Radio Toolbox\n","<ADIF_VER:5>3.1.4\n","<PROGRAMID:17>HAM Toolbox\n","<EOH>\n\n"];
  qsos.forEach(q=>{let c=q.call||"",d=(q.date||"").replace(/-/g,""),t=(q.time||"").replace(/:/g,""),f=q.freq||"",m=q.mode||"SSB";
    let line=`<CALL:${c.length}>${c}<QSO_DATE:8>${d}<TIME_ON:4>${t}`;
    if(f)line+=`<FREQ:${f.length}>${f}`;line+=`<MODE:${m.length}>${m}`;
    if(q.rst_s)line+=`<RST_SENT:${q.rst_s.length}>${q.rst_s}`;if(q.rst_r)line+=`<RST_RCVD:${q.rst_r.length}>${q.rst_r}`;
    if(q.name)line+=`<NAME:${q.name.length}>${q.name}`;if(q.qth)line+=`<QTH:${q.qth.length}>${q.qth}`;
    if(q.note)line+=`<COMMENT:${q.note.length}>${q.note}`;line+="<EOR>\n";lines.push(line)});
  let blob=new Blob([lines.join("")],{type:"text/plain;charset=utf-8"}),url=URL.createObjectURL(blob);
  let a=document.createElement("a");a.href=url;a.download=`qso_export_${new Date().toISOString().slice(0,10)}.adi`;a.click();URL.revokeObjectURL(url);status("已导出 ADIF")};
logRefresh();

let sDesc=["极弱，勉强可闻","很弱","弱","尚可","较好","良好","较强","强","极强","S9+ 超强"];
let tDesc=["严重的交流声","粗糙交流音","粗糙音带乐感","略带滤波","有乐感带交流声","滤波音带纹波","近纯直流","完美直流无交流声","完美但有频移","完美的音调"];
byId("rstBtn").onclick=()=>{let v=parseInt(byId("rstIn").value);if(isNaN(v))return;let s=String(v).padStart(3,"0");
  let r=parseInt(s[0]),sig=parseInt(s[1]),t=parseInt(s[2]);let rd=r>=1&&r<=5?rDesc[r-1]:"?",sd=sig>=1&&sig<=10?sDesc[sig-1]:"?",td=t>=1&&t<=10?tDesc[t-1]:"?";
  byId("rstResult").textContent=`RST ${v}\n\nR=${r} 可辨度: ${rd}\nS=${sig} 信号强度: ${sd}\nT=${t} 音质: ${td}`};
byId("rstIn").onkeydown=e=>{if(e.key==="Enter")byId("rstBtn").click()};
function clock(){let n=new Date();let u=n.toISOString().slice(0,19).replace("T"," ")+"  UTC";
  byId("utcDisplay").textContent=u;let h=n.getUTCHours().toString().padStart(2,"0")+n.getUTCMinutes().toString().padStart(2,"0")+"Z";
  let d=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  byId("utcHam").textContent=`${h}  ${n.getUTCDate()} ${d[n.getUTCMonth()]} ${n.getUTCFullYear()}`}clock();setInterval(clock,1e3);

})();
function byId(id){return document.getElementById(id)}
